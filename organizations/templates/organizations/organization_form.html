{% extends "base_adminlte.html" %}
{% block title %}Organization Form{% endblock %}
{% block content %}
<div class="card card-outline card-primary shadow-sm">
  <div class="card-header">
    <h3 class="card-title"><i class="bi bi-building me-2"></i>Organization</h3>
  </div>
  <div class="card-body">
    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}
      <div class="mb-3">
        <label for="{{ form.name.id_for_label }}" class="form-label">Name</label>
        {{ form.name }}
      </div>
      <div class="mb-3">
        <label for="{{ form.logo.id_for_label }}" class="form-label">Logo</label>
        {{ form.logo }}
        <div class="form-text">Upload a logo image (optional).</div>
      </div>
      <div class="mb-3">
        <label for="{{ form.description.id_for_label }}" class="form-label">Description</label>
        {{ form.description }}
      </div>
      <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg me-1"></i>Save</button>
      <a href="{% url 'organization_list' %}" class="btn btn-outline-secondary ms-2">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
