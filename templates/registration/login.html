{% extends 'base_adminlte.html' %}

{% block auth_content %}
<div class="d-flex align-items-center justify-content-center min-vh-100 bg-body-tertiary">
  <div class="login-box" style="width: 360px;">
    <div class="login-logo mb-4 text-center">
      <a href="/" class="text-decoration-none"><b>VAMPIRE</b></a>
    </div>
    <div class="card shadow">
      <div class="card-body p-4">
        <p class="text-center text-secondary mb-4">Sign in to start your session</p>

        <form method="post">
          {% csrf_token %}
          <div class="input-group mb-3">
            <span class="input-group-text"><i class="bi bi-person"></i></span>
            <input type="text" name="username" class="form-control" placeholder="Username" required>
          </div>
          <div class="input-group mb-3">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" name="password" class="form-control" placeholder="Password" required>
          </div>
          <button type="submit" class="btn btn-primary w-100">Sign In</button>
        </form>

        {% if form.errors %}
        <p class="text-danger mt-3 mb-0 text-center">Your username and password didn't match. Please try again.</p>
        {% endif %}
      </div>
    </div>
  </div>
</div>
{% endblock %}
