{% extends "base_adminlte.html" %}
{% block title %}Role Form{% endblock %}
{% block content %}
<div class="card card-primary card-outline">
  <div class="card-header">
    <h3 class="card-title">Role Form</h3>
  </div>
  <div class="card-body">
    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label">{{ form.role_name.label }}</label>
        {{ form.role_name }}
      </div>
      <div class="mb-3">
        <label class="form-label">{{ form.description.label }}</label>
        {{ form.description }}
      </div>
      <div class="mb-3">
        <label class="form-label fw-bold">Menus</label>
        {% for menu in form.menus %}
          <div class="form-check">{{ menu.tag }} {{ menu.choice_label }}</div>
        {% endfor %}
      </div>
      <button type="submit" class="btn btn-primary">Save</button>
      <a href="{% url 'role_list' %}" class="btn btn-secondary ms-2">Back</a>
    </form>
  </div>
</div>
{% endblock %}
